ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [
      com.votingapp.ApplicationKt.module
    ]
  }
  jwt {
    secret = "dev-secret-change-before-production"
    secret = ${?JWT_SECRET}
    issuer = "voting-server"
    audience = "voting-client"
    realm = "VotingApp"
  }
  database {
    mode = "auto"
    mode = ${?DB_MODE}
    url = "jdbc:postgresql://localhost:5432/voting_app"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DB_USER}
    password = "postgres"
    password = ${?DB_PASSWORD}
  }
}
